<!DOCTYPE html>
<html>
<head>
<title>Hospital System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { display:flex; height:100vh; font-family:Arial; background:#f4f6f9; }

/* SIDEBAR */
.sidebar {
    width:220px;
    background:#1e293b;
    color:white;
    padding:20px;
    text-align:center;
}

.sidebar h2 { margin-bottom:30px; }

.sidebar li {
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.sidebar li:hover { background:#334155; }

/* MAIN */
.main { flex:1; padding:20px; }

.topbar {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* SECTION */
.section { display:none; }

/* CARDS */
.cards { display:flex; gap:20px; }
.card {
    background:white;
    padding:20px;
    border-radius:20px;
    flex:1;
}

/* INPUT */
input {
    display:block;
    margin:10px 0;
    padding:12px;
    width:300px;
    border-radius:25px;
    border:2px solid black;
}

/* BUTTON */
button {
    padding:10px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:25px;
    cursor:pointer;
    margin:3px;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}

th {
    background:#1e293b;
    color:white;
}

td, th {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>MEDGRAPH</h2>
<ul style="list-style:none;">
<li onclick="show('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
<li onclick="show('patients')"><i class="fa-solid fa-user-injured"></i> Patients</li>
<li onclick="show('doctors')"><i class="fa-solid fa-user-doctor"></i> Doctors</li>
<li onclick="show('appointments')"><i class="fa-solid fa-calendar-check"></i> Appointment</li>
</ul>
</div>

<div class="main">

<div class="topbar">
<h2 id="title">Dashboard</h2>
<div id="date"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<div class="cards">
<div class="card">
<h3>Total Patients</h3>
<p id="patientCount">0</p>
</div>

<div class="card">
<h3>Total Doctors</h3>
<p id="doctorCount">0</p>
</div>
</div>
</div>

<div id="patients" class="section">
<h2>Patient</h2>

<input id="pName" placeholder="Name">
<input id="pAge" placeholder="Age">
<input id="pGender" placeholder="Gender">

<button onclick="addPatient()">Add</button>
<button onclick="updatePatient()">Update</button>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchPatient" placeholder="Search patient..." onkeyup="searchPatients()">
    <i class="fa fa-search"></i>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Action</th>
</tr>
</thead>
<tbody id="patientTable"></tbody>
</table>
</div>

<!-- DOCTOR -->
<div id="doctors" class="section">
<h2>Doctor</h2>

<input id="dName" placeholder="Name">
<input id="dSpec" placeholder="Specialization">
<input id="dPhone" placeholder="Phone">

<button onclick="addDoctor()">Add</button>
<button onclick="updateDoctor()">Update</button>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchDoctor" placeholder="Search doctor..." onkeyup="searchDoctors()">
    <i class="fa fa-search"></i>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>
<tbody id="doctorTable"></tbody>
</table>
</div>

<!-- APPOINTMENT -->
<div id="appointments" class="section">
<h2>Appointment</h2>

<input id="aPatientId" placeholder="Patient ID">
<input id="aDoctorId" placeholder="Doctor ID">
<input id="aDate" type="datetime-local">

<button onclick="addAppointment()">Add</button>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchAppointment" placeholder="Search appointment..." onkeyup="searchAppointments()">
    <i class="fa fa-search"></i>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Patient ID</th>
<th>Doctor ID</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>
<tbody id="appointmentTable"></tbody>
</table>
</div>

</div>

<script>



const api = "http://localhost:5160/api";

document.getElementById("date").innerText = new Date().toDateString();

show('dashboard');

function searchPatients(){
    let input = document.getElementById("searchPatient").value.toLowerCase();
    let rows = document.querySelectorAll("#patientTable tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

function searchDoctors(){
    let input = document.getElementById("searchDoctor").value.toLowerCase();
    let rows = document.querySelectorAll("#doctorTable tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

function searchAppointments(){
    let input = document.getElementById("searchAppointment").value.toLowerCase();
    let rows = document.querySelectorAll("#appointmentTable tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
// SWITCH
function show(section){
    document.querySelectorAll('.section').forEach(s => s.style.display="none");
    document.getElementById(section).style.display="block";
    document.getElementById("title").innerText = section.toUpperCase();

    if(section==="dashboard") loadDashboard();
    if(section==="patients") loadPatients();
    if(section==="doctors") loadDoctors();
    if(section==="appointments") loadAppointments();
}

// DASHBOARD
async function loadDashboard(){
    let p = await fetch(api+"/Patient");
    let patients = await p.json();

    let d = await fetch(api+"/Doctor");
    let doctors = await d.json();

    patientCount.innerText = patients.length;
    doctorCount.innerText = doctors.length;
}

// ================= PATIENT =================
let currentPatientId = null;

async function addPatient(){
    await fetch(api+"/Patient",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:pName.value,
            age:parseInt(pAge.value),
            gender:pGender.value
        })
    });
    loadPatients();
}

function editPatient(id,name,age,gender){
    document.getElementById("pName").value = name;
    document.getElementById("pAge").value = age;
    document.getElementById("pGender").value = gender;

    currentPatientId = id;

    alert("Now click UPDATE to save changes"); // optional
}

async function updatePatient(){
    if(currentPatientId === null){
        alert("Select patient first");
        return;
    }

    let payload = {
        id: currentPatientId,
        name: pName.value,
        age: parseInt(pAge.value),
        gender: pGender.value
    };

    console.log("Updating patient:", payload);

    let res = await fetch(api+"/Patient/"+currentPatientId,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(payload)
    });

    console.log("Response:", res.status);

    if(res.ok){
        alert("Updated successfully");
        currentPatientId = null;
        loadPatients();
    } else {
        let text = await res.text();
        console.log(text);
        alert("Update failed: " + res.status);
    }
}
async function deletePatient(id){
    if(confirm("Delete this patient?")){
        try {
            let res = await fetch(api+"/Patient/"+id,{
                method:"DELETE"
            });

            console.log(res.status);

            if(res.ok){
                alert("Deleted successfully");
                await loadPatients(); // important
            } else {
                alert("Delete failed: " + res.status);
            }

        } catch(err){
            alert("Error: " + err);
        }
    }
}

async function loadPatients(){
    let res = await fetch(api+"/Patient");
    let data = await res.json();

    patientTable.innerHTML="";
    data.forEach(p=>{
        patientTable.innerHTML+=`
        <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.age}</td>
        <td>${p.gender}</td>
        <td>
        <button onclick="editPatient(${p.id},'${p.name}',${p.age},'${p.gender}')">Edit</button>
        <button onclick="deletePatient(${p.id})">Delete</button>
        </td>
        </tr>`;
    });
}

// ================= DOCTOR =================
let currentDoctorId = null;

async function addDoctor(){
    await fetch(api+"/Doctor",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:dName.value,
            specialization:dSpec.value,
            phone:dPhone.value
        })
    });
    loadDoctors();
}

function editDoctor(id,name,spec,phone){
    dName.value = name;
    dSpec.value = spec;
    dPhone.value = phone;

    currentDoctorId = id;
}

async function updateDoctor(){
    if(currentDoctorId === null){
        alert("Select doctor first");
        return;
    }

    let payload = {
        id: currentDoctorId,
        name: dName.value,
        specialization: dSpec.value,
        phone: dPhone.value
    };

    console.log("Updating doctor:", payload);

    let res = await fetch(api+"/Doctor/"+currentDoctorId,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(payload)
    });

    console.log("Response:", res.status);

    if(res.ok){
        alert("Updated successfully");
        currentDoctorId = null;
        loadDoctors();
    } else {
        let text = await res.text();
        console.log(text);
        alert("Update failed: " + res.status);
    }
}

async function deleteDoctor(id){
    if(confirm("Delete this doctor?")){
        let res = await fetch(api+"/Doctor/"+id,{
            method:"DELETE"
        });

        if(res.ok){
            alert("Deleted successfully");
            loadDoctors();
        } else {
            alert("Delete failed");
        }
    }
}
async function loadDoctors(){
    let res = await fetch(api+"/Doctor");
    let data = await res.json();

    doctorTable.innerHTML="";
    data.forEach(d=>{
        doctorTable.innerHTML+=`
        <tr>
        <td>${d.id}</td>
        <td>${d.name}</td>
        <td>${d.specialization}</td>
        <td>${d.phone}</td>
        <td>
        <button onclick="editDoctor(${d.id},'${d.name}','${d.specialization}','${d.phone}')">Edit</button>
        <button onclick="deleteDoctor(${d.id})">Delete</button>
        </td>
        </tr>`;
    });
}

// ================= APPOINTMENT =================
async function addAppointment(){
    await fetch(api+"/Appointment",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            patientId:parseInt(aPatientId.value),
            doctorId:parseInt(aDoctorId.value),
            appointmentDate:aDate.value,
            status:"Pending"
        })
    });
    loadAppointments();
}

async function loadAppointments(){
    let res = await fetch(api+"/Appointment");
    let data = await res.json();

    appointmentTable.innerHTML="";
    data.forEach(a=>{
        appointmentTable.innerHTML+=`
        <tr>
        <td>${a.id}</td>
        <td>${a.patientId}</td>
        <td>${a.doctorId}</td>
        <td>${a.appointmentDate}</td>
        <td>${a.status}</td>
        </tr>`;
    });
}
</script>

</body>
</html>
